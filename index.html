<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teste — Player Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 5vw, 42px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 0 60px rgba(232,255,71,0.05);
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
    }

    .card-tag {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      background: var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .card-footer {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(232,255,71,0.1);
      color: var(--accent);
      border: 1px solid rgba(232,255,71,0.2);
    }

    .footer-note {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    .note {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 500px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="label">Canjica Studio</div>
  <h1>Teste de Player</h1>
  <p class="subtitle">Vídeo embutido via iframe do Google Drive</p>

  <div class="card">
    <div class="card-header">
      <div class="dot"></div>
      <span class="card-title">Nome do Vídeo Aqui</span>
      <span class="card-tag">🎬 Vídeo Editado</span>
    </div>

    <div class="video-wrapper">
      <iframe
        src="https://drive.google.com/file/d/1gfbioMiiPxrcRYm_TnsboqU7fJtShCsc/preview?t=1"
        allow="autoplay"
        allowfullscreen>
      </iframe>
    </div>

    <div class="card-footer">
      <span class="badge">🥩 Cabana</span>
      <span class="footer-note">Assista sem sair da página</span>
    </div>
  </div>

  <p class="note">
    O vídeo carrega direto do Drive — o HTML continua leve.<br/>
    Funciona no GitHub Pages sem nenhum problema. ✅
  </p>

</body>
</html>
